services:

  postgres:
    image: postgres:17
    container_name: grocery-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  api:
    build:
      context: ./grocery-api

    container_name: grocery-api

    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest

    container_name: grocery-nginx

    restart: unless-stopped

    depends_on:
      - api

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
